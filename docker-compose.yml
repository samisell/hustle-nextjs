services:
  mysql:
    image: mysql:8.4
    container_name: hustle-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hustle}
      MYSQL_USER: ${MYSQL_USER:-hustle}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hustlepass}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hustle-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3300:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: mysql://${MYSQL_USER:-hustle}:${MYSQL_PASSWORD:-hustlepass}@mysql:3306/${MYSQL_DATABASE:-hustle}
      ADMIN_SETUP_SECRET: ${ADMIN_SETUP_SECRET:-hustle-admin-setup-2024}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret}

volumes:
  mysql_data:
