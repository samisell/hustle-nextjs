services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hustle-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:./db/custom.db
    volumes:
      - hustle_db:/app/db

volumes:
  hustle_db:
